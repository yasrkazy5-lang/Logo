<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mod Card Maker</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #0a0a14;
    min-height: 100vh;
    font-family: 'Segoe UI', system-ui, sans-serif;
    color: #fff;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }

  h1 {
    font-size: 15px;
    font-weight: 700;
    color: #60a5fa;
    letter-spacing: 3px;
    text-transform: uppercase;
    margin-bottom: 28px;
    font-family: 'Segoe UI', sans-serif;
  }

  .builder {
    background: #111120;
    border: 1px solid #1e3a5f;
    border-radius: 16px;
    padding: 24px;
    width: 100%;
    max-width: 420px;
    box-shadow: 0 0 30px rgba(59,130,246,0.08);
  }

  /* Upload zone */
  .upload-zone {
    border: 2px dashed #1e3a5f;
    border-radius: 12px;
    padding: 28px 16px;
    text-align: center;
    cursor: pointer;
    transition: all 0.2s;
    margin-bottom: 18px;
    position: relative;
    background: #0d0d1a;
    overflow: hidden;
  }
  .upload-zone:hover { border-color: #3b82f6; background: #0f1525; }
  .upload-zone.has-image {
    border-style: solid;
    border-color: #3b82f6;
    padding: 12px;
  }
  .upload-zone input[type="file"] {
    position: absolute;
    inset: 0;
    opacity: 0;
    cursor: pointer;
    width: 100%;
    height: 100%;
    z-index: 2;
  }
  .upload-zone .upload-icon { font-size: 32px; margin-bottom: 8px; display: block; }
  .upload-zone .upload-text { font-size: 13px; color: #4b6a8f; }
  .upload-zone.has-image .upload-icon { display: none; }
  .upload-zone.has-image .upload-text { font-size: 11px; color: #3b82f6; margin-top: 6px; }
  #zone-preview-img {
    width: 80px;
    height: 80px;
    border-radius: 10px;
    object-fit: cover;
    display: none;
    margin: 0 auto;
  }
  .upload-zone.has-image #zone-preview-img { display: block; }

  /* Fields */
  .field { margin-bottom: 14px; }
  .field label {
    display: block;
    font-size: 11px;
    color: #4b6a8f;
    letter-spacing: 1px;
    margin-bottom: 6px;
  }
  .field input {
    width: 100%;
    background: #0d0d1a;
    border: 1px solid #1e3a5f;
    border-radius: 8px;
    padding: 10px 14px;
    font-size: 14px;
    color: #fff;
    outline: none;
    transition: border-color 0.2s;
    font-family: inherit;
    direction: ltr;
  }
  .field input:focus {
    border-color: #3b82f6;
    box-shadow: 0 0 0 2px rgba(59,130,246,0.12);
  }
  .field input::placeholder { color: #2a3f5f; }

  /* Preview */
  .preview-label {
    font-size: 11px;
    color: #4b6a8f;
    letter-spacing: 1px;
    margin-bottom: 10px;
    margin-top: 4px;
  }

  #card-preview {
    background: #111118;
    border: 1px solid #1e3a5f;
    border-radius: 12px;
    display: flex;
    flex-direction: row !important;
    align-items: center;
    gap: 14px;
    padding: 12px 16px;
    margin-bottom: 18px;
    box-shadow: 0 0 16px rgba(59,130,246,0.1);
    direction: ltr !important;
  }

  .preview-icon {
    flex-shrink: 0;
    width: 64px;
    height: 64px;
    border-radius: 10px;
    border: 2px solid #3b82f6;
    box-shadow: 0 0 12px rgba(59,130,246,0.45);
    overflow: hidden;
    background: #0d1525;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .preview-icon img { width: 100%; height: 100%; object-fit: cover; display: none; }
  .preview-icon .ph { font-size: 24px; opacity: 0.3; }

  .preview-info { display: flex; flex-direction: column; gap: 3px; }
  .preview-name { font-size: 16px; font-weight: 700; color: #fff; }
  .preview-name.ph-text { color: #2a3f5f; }
  .preview-version { font-size: 12px; color: #60a5fa; font-weight: 500; }
  .preview-version.ph-text { color: #1e3a5f; }
  .preview-author { font-size: 11px; color: #6b7280; margin-top: 1px; }

  /* Button */
  #download-btn {
    width: 100%;
    background: #1d4ed8;
    color: #fff;
    border: none;
    border-radius: 10px;
    padding: 12px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.2s, box-shadow 0.2s;
    font-family: inherit;
  }
  #download-btn:hover:not(:disabled) {
    background: #2563eb;
    box-shadow: 0 0 16px rgba(59,130,246,0.35);
  }
  #download-btn:disabled {
    background: #1e2a3f;
    color: #2a3f5f;
    cursor: not-allowed;
  }

  canvas { display: none; }
</style>
</head>
<body>

<h1>Mod Card Maker</h1>

<div class="builder">

  <div class="upload-zone" id="upload-zone">
    <input type="file" id="img-input" accept="image/*">
    <span class="upload-icon">🖼️</span>
    <img id="zone-preview-img" src="" alt="">
    <div class="upload-text">اضغط لرفع صورة المود</div>
  </div>

  <div class="field">
    <label>اسم المود</label>
    <input type="text" id="mod-name" placeholder="Pickup & Carry!" maxlength="40">
  </div>

  <div class="field">
    <label>الإصدار</label>
    <input type="text" id="mod-version" placeholder="v26.33" maxlength="20">
  </div>

  <div class="preview-label">معاينة</div>
  <div id="card-preview">
    <div class="preview-icon">
      <img id="preview-img" src="" alt="">
      <span class="ph">📦</span>
    </div>
    <div class="preview-info">
      <div class="preview-name ph-text" id="preview-name">اسم المود</div>
      <div class="preview-version ph-text" id="preview-version">v0.0</div>
      <div class="preview-author">Mohannd</div>
    </div>
  </div>

  <button id="download-btn" disabled>تحميل الكرت 📥</button>
</div>

<canvas id="canvas"></canvas>

<script>
  const imgInput       = document.getElementById('img-input');
  const uploadZone     = document.getElementById('upload-zone');
  const zoneImg        = document.getElementById('zone-preview-img');
  const previewImg     = document.getElementById('preview-img');
  const previewPh      = document.querySelector('.preview-icon .ph');
  const previewName    = document.getElementById('preview-name');
  const previewVersion = document.getElementById('preview-version');
  const modNameInput   = document.getElementById('mod-name');
  const modVersionInput= document.getElementById('mod-version');
  const downloadBtn    = document.getElementById('download-btn');
  const canvas         = document.getElementById('canvas');
  const ctx            = canvas.getContext('2d');

  let loadedImage = null;

  function checkReady() {
    const ok = loadedImage && modNameInput.value.trim() && modVersionInput.value.trim();
    downloadBtn.disabled = !ok;
  }

  // Image upload
  imgInput.addEventListener('change', (e) => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (ev) => {
      const img = new Image();
      img.onload = () => {
        loadedImage = img;
        // zone preview
        zoneImg.src = ev.target.result;
        uploadZone.classList.add('has-image');
        uploadZone.querySelector('.upload-text').textContent = 'اضغط لتغيير الصورة';
        // card preview
        previewImg.src = ev.target.result;
        previewImg.style.display = 'block';
        previewPh.style.display = 'none';
        checkReady();
      };
      img.src = ev.target.result;
    };
    reader.readAsDataURL(file);
  });

  // Live name update
  modNameInput.addEventListener('input', () => {
    const val = modNameInput.value.trim();
    if (val) {
      previewName.textContent = val;
      previewName.classList.remove('ph-text');
    } else {
      previewName.textContent = 'اسم المود';
      previewName.classList.add('ph-text');
    }
    checkReady();
  });

  // Live version update
  modVersionInput.addEventListener('input', () => {
    const val = modVersionInput.value.trim();
    if (val) {
      previewVersion.textContent = val;
      previewVersion.classList.remove('ph-text');
    } else {
      previewVersion.textContent = 'v0.0';
      previewVersion.classList.add('ph-text');
    }
    checkReady();
  });

  // Download
  downloadBtn.addEventListener('click', () => {
    const W = 760, H = 160;
    canvas.width = W;
    canvas.height = H;

    // BG
    ctx.fillStyle = '#111118';
    roundRect(ctx, 0, 0, W, H, 18);
    ctx.fill();

    // Border
    ctx.strokeStyle = '#1e3a5f';
    ctx.lineWidth = 2;
    roundRect(ctx, 1, 1, W-2, H-2, 17);
    ctx.stroke();

    // Icon glow + clip
    const ix = 24, iy = 24, is = 112, ir = 14;
    ctx.save();
    ctx.shadowColor = 'rgba(59,130,246,0.6)';
    ctx.shadowBlur = 20;
    ctx.strokeStyle = '#3b82f6';
    ctx.lineWidth = 2.5;
    roundRect(ctx, ix, iy, is, is, ir);
    ctx.stroke();
    ctx.restore();

    ctx.save();
    roundRect(ctx, ix, iy, is, is, ir);
    ctx.clip();
    ctx.drawImage(loadedImage, ix, iy, is, is);
    ctx.restore();

    // Text (LTR side)
    const tx = ix + is + 22;

    ctx.fillStyle = '#ffffff';
    ctx.font = 'bold 28px Segoe UI, sans-serif';
    ctx.textAlign = 'left';
    ctx.fillText(modNameInput.value.trim(), tx, 62);

    ctx.fillStyle = '#60a5fa';
    ctx.font = '500 18px Segoe UI, sans-serif';
    ctx.fillText(modVersionInput.value.trim(), tx, 96);

    ctx.fillStyle = '#6b7280';
    ctx.font = '15px Segoe UI, sans-serif';
    ctx.fillText('Mohannd', tx, 122);

    const link = document.createElement('a');
    link.download = 'mod-card.png';
    link.href = canvas.toDataURL('image/png');
    link.click();
  });

  function roundRect(c, x, y, w, h, r) {
    c.beginPath();
    c.moveTo(x+r, y);
    c.lineTo(x+w-r, y);
    c.quadraticCurveTo(x+w, y, x+w, y+r);
    c.lineTo(x+w, y+h-r);
    c.quadraticCurveTo(x+w, y+h, x+w-r, y+h);
    c.lineTo(x+r, y+h);
    c.quadraticCurveTo(x, y+h, x, y+h-r);
    c.lineTo(x, y+r);
    c.quadraticCurveTo(x, y, x+r, y);
    c.closePath();
  }
</script>
</body>
</html>
